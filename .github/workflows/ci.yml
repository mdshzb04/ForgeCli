name: ci

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  test:
    name: test (${{ matrix.os }} / py${{ matrix.python-version }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
        python-version: ["3.12"]

    steps:
      - name: Check out
        uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip

      - name: Install
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e ".[dev]"

      - name: Run doctor (smoke test)
        run: forge doctor

      - name: Lint
        run: python -m ruff check forgecli tests

      - name: Tests
        run: python -m pytest -q

      - name: Cross-platform shell smoke
        if: runner.os != 'Windows'
        shell: bash
        run: |
          python -c "from forgecli.platform import run; r = run(['echo', 'cross-platform']); print('OK' if r.ok else 'FAIL')"

      - name: Cross-platform shell smoke (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          python -c "from forgecli.platform import run; r = run(['cmd.exe', '/c', 'echo cross-platform']); print('OK' if r.ok else 'FAIL')"

  # ─── Build sdist + wheel ──────────────────────────────────────────
  build:
    name: build sdist + wheel
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install build
        run: python -m pip install --upgrade build
      - name: Build
        run: python -m build
      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: dist
          path: dist/

  # ─── Smoke-test `uv tool install` from the built wheel ────────────
  uv-install:
    name: uv tool install (${{ matrix.os }})
    needs: build
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    steps:
      - name: Check out
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install uv
        uses: astral-sh/setup-uv@v6

      - uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist/

      - name: Install ForgeCLI via uv tool
        shell: bash
        run: |
          uv tool install dist/*.whl

      - name: Verify forge --help
        run: uv tool run forge --help

      - name: Verify forge doctor
        run: uv tool run forge doctor

      - name: Verify forge init
        shell: bash
        run: |
          cd "$RUNNER_TEMP"
          uv tool run forge init --json

  # ─── Publish to TestPyPI (on tag) ─────────────────────────────────
  publish-testpypi:
    name: publish to TestPyPI (on tag)
    if: startsWith(github.ref, 'refs/tags/v')
    needs: [test, build, uv-install]
    runs-on: ubuntu-latest
    environment: testpypi
    permissions:
      id-token: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist/
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Publish
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          repository-url: https://test.pypi.org/legacy/
          skip-existing: true

  # ─── Publish to PyPI (on tag) ─────────────────────────────────────
  publish-pypi:
    name: publish to PyPI (on tag)
    if: startsWith(github.ref, 'refs/tags/v')
    needs: [test, build, uv-install]
    runs-on: ubuntu-latest
    environment: pypi
    permissions:
      id-token: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist/
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Publish
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          skip-existing: true
