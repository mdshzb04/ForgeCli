# ForgeCLI configuration — generated by `forge init`.
# Docs: https://github.com/mdshzb04/ForgeCli#readme

[app]
log_level = "INFO"

[providers]
default = "openai"
allowed = ["openai"]

[prompt_optimizer]
enabled = true
intensity = "lite"
backend = "ruleset"   # built-in; no external binary needed

[graph]
enabled = true
languages = ["python", "typescript"]

[git]
default_branch = "main"
